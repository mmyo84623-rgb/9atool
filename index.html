    // ──────────────────────────────────────────────────────────────

    const selected = new Set();

    liff.init({ liffId: LIFF_ID }).catch(err => console.warn("LIFF init failed (dev mode):", err));

    document.getElementById("page-title").textContent = PAGE_TITLE;

    const grid = document.getElementById("item-grid");
    items.forEach(item => {
      const card = document.createElement("div");
      card.id = `card-${item.id}`;
      card.className = "relative rounded-2xl overflow-hidden border-2 border-transparent cursor-pointer select-none transition-all duration-150";
      card.innerHTML = `
        <img src="${item.image}" alt="${item.label}" class="w-full aspect-square object-cover" />
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent px-2 py-2">
          <p class="text-white text-sm font-medium truncate">${item.label}</p>
        </div>
        <div id="check-${item.id}" class="absolute inset-0 bg-green-500/30 hidden items-center justify-center">
          <div class="bg-green-500 rounded-full w-8 h-8 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
        </div>
      `;
      card.addEventListener("click", () => toggleItem(item.id, card));
      grid.appendChild(card);
    });

    function toggleItem(id, card) {
      if (selected.has(id)) {
        selected.delete(id);
        card.classList.remove("border-green-500", "shadow-lg");
        card.classList.add("border-transparent");
        const check = document.getElementById(`check-${id}`);
        check.classList.add("hidden");
        check.classList.remove("flex");
      } else {
        selected.add(id);
        card.classList.add("border-green-500", "shadow-lg");
        card.classList.remove("border-transparent");
        const check = document.getElementById(`check-${id}`);
        check.classList.remove("hidden");
        check.classList.add("flex");
      }
      document.getElementById("selected-count").textContent = selected.size;
      document.getElementById("confirm-btn").disabled = selected.size === 0;
    }

    function sendSelected() {
      const selectedItems = items.filter(item => selected.has(item.id));
      const listText = selectedItems.map(item => `• ${item.label}`).join("\n");
      const message = `復健項目,您選擇了以下 ${selectedItems.length} 項：\n${listText}`;

      if (liff.isInClient()) {
        liff.sendMessages([{ type: "text", text: message }])
          .then(() => liff.closeWindow())
          .catch(err => alert("送出失敗：" + err));
      } else {
        // 瀏覽器開發預覽用
        alert("[開發預覽]\n\n" + message);
      }
    }
